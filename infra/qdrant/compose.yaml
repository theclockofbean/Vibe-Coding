services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: ai-kb-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

volumes:
  qdrant_storage:
    name: ai_kb_qdrant_storage
