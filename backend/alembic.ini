[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# The real database URL is loaded from the project root .env file
# and is overridden by alembic/env.py.
# Never store real credentials in this file.
sqlalchemy.url = postgresql+psycopg://placeholder:placeholder@127.0.0.1/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S